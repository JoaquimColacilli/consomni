<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consomni — Split / grid</title>
<link rel="stylesheet" href="tokens.css">
<style>
  .grid{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:14px 16px;min-height:0;}
  .pane{display:flex;flex-direction:column;min-height:0;background:#0c0c0f;border:1px solid var(--border);border-radius:11px;overflow:hidden;transition:border-color .14s;}
  .pane.active{border-color:rgba(74,222,128,.35);box-shadow:var(--glow-green);}
  .pane.attn{border-color:rgba(245,158,11,.45);box-shadow:var(--glow-amber);}
  .pane-head{flex:none;display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);background:#0e0e12;}
  .pane-head .nm{font-size:12.5px;color:#dcdce2;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .pane-sub{flex:none;display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid var(--border-soft);font-size:10.5px;color:var(--text-3);background:rgba(255,255,255,.012);}
  .pane-sub .ctx{width:46px;}
  .term{flex:1;overflow-y:auto;padding:11px 13px;font-size:11px;line-height:1.65;min-height:0;}
  .ln{display:flex;gap:8px;animation:feedIn .3s ease;}
  .ln .ts{flex:none;color:var(--text-faint);font-size:9.5px;width:38px;padding-top:1px;}
  .ln .bd{flex:1;color:#b4b4ba;word-break:break-word;}
  .ln .pfx{color:var(--green);}
  .ln .tool{font-weight:600;}
  .ln .dim{color:var(--text-3);}
  .ln .ok{color:var(--green);}
  .ln .err{color:var(--error);}
  .ln .warn{color:var(--amber-2);}
  .term .cur{display:inline-block;width:7px;height:13px;vertical-align:-2px;margin-left:2px;animation:caret 1.1s steps(1) infinite;}
  .pane-foot{flex:none;display:flex;align-items:center;gap:8px;padding:8px 12px;border-top:1px solid var(--border);background:#0d0d11;}
  .pane-foot input{flex:1;background:transparent;border:none;outline:none;color:var(--text-1);font-family:var(--mono);font-size:11px;}
  .pane-foot input::placeholder{color:#4a4a50;}
</style>
</head>
<body>
<div class="app">
  <span data-chrome="topbar"></span>

  <div style="flex:none;display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--border-soft);font-size:11px;color:var(--text-3);">
    <span class="row" style="gap:6px;color:#cfcfd4;font-size:12px;font-weight:600" id="splitTitle"></span>
    <span style="color:var(--text-3)">3 sesiones · feeds en vivo</span>
    <span style="margin-left:auto" class="row gap6">
      <span class="seg"><span>2</span><span class="on">3</span><span>4</span></span>
      <button class="iconbtn" id="gridBtn"></button>
    </span>
  </div>

  <div class="grid" id="grid"></div>
  <span data-chrome="statusbar"></span>
  <span data-chrome="crt"></span>
</div>

<script src="chrome.js"></script>
<script>
  Chrome.mount({ alert: true });
  document.getElementById('splitTitle').innerHTML = Chrome.svg('grid',14,1.8) + ' split';
  document.getElementById('gridBtn').innerHTML = Chrome.svg('grid',15,1.7);

  var panes = [
    {
      cls:'active', name:'Build dashboard UI', mode:'auto', proj:'Consomni',
      ctx:78, lvl:'amber', state:'<span style="color:var(--green)">● working</span>',
      log:[
        ['12:04','<span class="pfx">claude&gt;</span> iterando glow ámbar de atención'],
        ['12:04','<span class="tool" style="color:var(--blue-2)">Read</span> <span class="dim">tokens.css</span>'],
        ['12:04','<span class="tool" style="color:var(--violet)">Edit</span> Card.dc.html <span class="dim">:88</span>'],
        ['12:04','  <span class="ok">+ animation:breatheA 2.6s</span>'],
        ['12:04','<span class="tool" style="color:var(--green)">Bash</span> <span class="dim">npm run typecheck</span>'],
        ['12:04','  <span class="dim">tsc --noEmit … </span><span class="ok">ok (0 errors)</span>'],
        ['12:04','<span class="tool" style="color:var(--violet)">Edit</span> Board.dc.html <span class="dim">:12</span>'],
        ['12:04','<span class="pfx">claude&gt;</span> aplicando glow a cards working<span class="cur" style="background:var(--green)"></span>']
      ]
    },
    {
      cls:'attn', name:'Tickets', mode:'auto', proj:'Sar4',
      ctx:41, lvl:'green', state:'<span style="color:var(--amber)">● atención</span>',
      log:[
        ['12:03','<span class="pfx">claude&gt;</span> limpiando artefactos de build'],
        ['12:03','<span class="tool" style="color:var(--blue-2)">Read</span> <span class="dim">package.json</span>'],
        ['12:03','<span class="tool" style="color:var(--violet)">Glob</span> <span class="dim">dist/**  ·  142 archivos</span>'],
        ['12:04','<span class="tool" style="color:var(--green)">Bash</span> rm -rf ./dist ./.cache'],
        ['12:04','  <span class="warn">⚠ requiere permiso — comando destructivo</span>'],
        ['12:04','  <span class="dim">esperando aprobación…</span><span class="cur" style="background:var(--amber)"></span>']
      ]
    },
    {
      cls:'', name:'Migración DB', mode:'plan', proj:'NI',
      ctx:91, lvl:'red', state:'<span style="color:var(--amber)">● atención</span>',
      log:[
        ['12:01','<span class="pfx">claude&gt;</span> plan de migración 0042'],
        ['12:01','<span class="tool" style="color:var(--blue-2)">Read</span> <span class="dim">migrations/0042_add_users.sql</span>'],
        ['12:02','  <span class="dim">3 ALTER TABLE · 1 CREATE INDEX</span>'],
        ['12:02','<span class="tool" style="color:var(--blue-2)">Read</span> <span class="dim">schema.prisma</span>'],
        ['12:03','<span class="warn">⚠ contexto 91% — cerca del límite</span>'],
        ['12:03','<span class="pfx">claude&gt;</span> ¿aplico la migración a la DB local?'],
        ['12:03','  <span class="dim">esperando confirmación…</span><span class="cur" style="background:var(--amber)"></span>']
      ]
    }
  ];

  document.getElementById('grid').innerHTML = panes.map(function(p){
    var lvlCls = p.lvl==='red'?'ctx-pct--red':p.lvl==='amber'?'ctx-pct--amber':'';
    var log = p.log.map(function(l,i){
      return '<div class="ln" style="animation-delay:'+(i*0.04)+'s"><span class="ts">'+l[0]+'</span><span class="bd">'+l[1]+'</span></div>';
    }).join('');
    return '<div class="pane '+p.cls+'">'+
      '<div class="pane-head">'+
        '<span class="dot dot--'+(p.cls==='attn'?'amber pulse':p.cls==='active'?'green pulse':'amber pulse')+'" style="'+(p.cls==='active'?'box-shadow:0 0 6px rgba(74,222,128,.6)':'')+'"></span>'+
        '<span class="nm">'+p.name+'</span>'+
        '<span class="badge badge--'+p.mode+'">'+p.mode+'</span>'+
      '</div>'+
      '<div class="pane-sub">'+
        '<span style="color:var(--text-2)">'+p.proj+'</span><span class="sep">·</span>'+
        '<span class="ctx"><span class="ctx-fill ctx-fill--'+p.lvl+'" style="width:'+p.ctx+'%"></span></span>'+
        '<span class="'+lvlCls+'">'+p.ctx+'%</span>'+
        '<span style="margin-left:auto">'+p.state+'</span>'+
      '</div>'+
      '<div class="term">'+log+'</div>'+
      '<div class="pane-foot">'+Chrome.svg('reply',13,1.7)+'<input placeholder="responder a '+p.name+'…"></div>'+
    '</div>';
  }).join('');
</script>
</body>
</html>
