appId: com.ironidevz.consomni
productName: Consomni
copyright: Copyright © 2026 Joaquim Colacilli

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - src/renderer/**/*
  - hooks/**/*
  - package.json

# NO recompilar módulos nativos desde fuente (no hay MSVC en la máquina de build):
# node-pty se instala como binario PREBUILT para el ABI de Electron (ver README/CLAUDE.md).
npmRebuild: false

# El helper de hooks debe quedar fuera del asar: lo ejecuta `node` externo
# (el proceso de Claude Code), que no puede leer dentro de app.asar.
# node-pty es nativo: su .node tampoco puede cargarse desde dentro del asar.
asarUnpack:
  - hooks/**/*
  - node_modules/@homebridge/node-pty-prebuilt-multiarch/**/*

# La app es 100% offline y read-only sobre ~/.claude. No firma de código por ahora.
win:
  icon: build/icon.ico
  # Embebemos el icono en el .exe vía rcedit (signAndEditExecutable: true). NO firmamos
  # (sin cert → el paso de firma se saltea solo). El winCodeSign que electron-builder
  # necesita se pre-extrae sin los symlinks darwin (ver build/prep-wincodesign.ps1),
  # evitando el fallo de privilegio en máquinas sin Developer Mode/admin.
  signAndEditExecutable: true
  target:
    - target: portable
    - target: nsis
  artifactName: ${productName}-${version}-${arch}.${ext}

portable:
  artifactName: ${productName}-${version}-portable.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-Setup-${version}.${ext}
  shortcutName: Consomni
  # El acceso del ESCRITORIO lo maneja build/installer.nsh con un checkbox
  # (marcado por default) → desactivamos el automático para no duplicarlo.
  # El del MENÚ INICIO lo sigue creando electron-builder (createStartMenuShortcut).
  createDesktopShortcut: false
  # NSIS necesita .ico real; dejamos que electron-builder derive el icono del
  # instalador/accesos directos desde win.icon (png→ico automático).

# ── Auto-update (electron-updater) ──────────────────────────────────
# Canal de updates contra el repo PÚBLICO del proyecto en GitHub Releases.
# La app lee latest.yml + el nsis SIN token (repo público). Para PUBLICAR,
# el mantenedor corre `electron-builder --publish always` con GH_TOKEN seteado
# como variable de entorno LOCAL (write al repo) — NUNCA se commitea el token.
publish:
  provider: github
  owner: JoaquimColacilli
  repo: consomni
  releaseType: release
